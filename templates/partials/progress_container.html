<!-- Shared progress indicator – included by pages that use CLU streaming/progress helpers -->
<div class="row p-3" id="progress-container" style="display: none;">
    <div class="col-12">
        <div class="card border-primary">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0"><i class="bi bi-hourglass-split me-2"></i>Processing Progress</h5>
                <button type="button" class="btn-close btn-close-white" onclick="CLU.hideProgressIndicator()"
                    aria-label="Close"></button>
            </div>
            <div class="card-body">
                <div class="progress mb-3" style="height: 25px;">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                        role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                        0%
                    </div>
                </div>
                <div id="progress-text" class="text-muted">Initializing...</div>
            </div>
        </div>
    </div>
</div>
