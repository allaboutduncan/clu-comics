name: Build and Publish Docker

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 1. Required for multi-platform builds (emulates ARM64 on AMD64 runners)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # 2. Required for caching and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # 3. Explicitly define the architectures to build
          platforms: linux/amd64,linux/arm64
          tags: |
            allaboutduncan/comic-utils-web:${{ github.event.release.tag_name }}
            allaboutduncan/comic-utils-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max