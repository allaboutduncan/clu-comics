version: '3.9'
services:
    comic-utils:
        image: allaboutduncan/comic-utils-web:latest

        container_name: comic-utils
        logging:
            driver: "json-file"
            options:
                max-size: '20m'  # Reduce log size to 20MB
                max-file: '3'     # Keep only 3 rotated files
        restart: always
        ports:
            - '5577:5577'
        volumes:
            - '/var/run/docker.sock:/tmp/docker.sock:ro' # do not change this line
            - '/path/to/local/config:/config' # Maps local folder to container
            ## update the line below to map to your library.
            ## Your library MUST be mapped to '/data' for the app to work
            - "/e/Comics:/data"
            ## Additional folder if you want to use Folder Monitoring.
            - "/f/downloads:/downloads"
            - 'config-volume:/config'
            - '/path/to/cache:/cache' # Maps local folder for thumbnail cache (the SQLite DB lives in /config)
        environment:
            - FLASK_ENV=development
            ## Optional: Set username and password to require login
            # - CLU_USERNAME=admin
            # - CLU_PASSWORD=changeme
            ## Set to 'yes' if you want to use folder monitoring.
            - MONITOR=yes/no
            ## Set the User ID (PUID) and Group ID (PGID) for the container.
            ## This is often needed to resolve permission issues, especially on systems like Unraid
            ## where a specific user/group owns the files.
            ## For Unraid, PUID is typically 99 (user 'nobody') and PGID is typically 100 (group 'users').
            ## For Windows/WSL, you need to set these to match your Windows user ID (see WINDOWS_WSL_SETUP.md)
            # - PUID=99
            # - PGID=100
            ## File creation mask. Default is 000 -> world-writable folders (drwxrwsrwx) and
            ## files (-rw-rw-rw-), so any account (NAS file browser, other containers, a second
            ## user not in the share group) can write into CLU-created files/folders. Use 002 for
            ## group-writable (775/664, needs PGID = your NAS share group), or 022 for owner-only.
            # - UMASK=000
            # GCD Database: download the SQLite dump from https://www.comics.org/download/,
            # mount it into the container, and point CLU at it (or set the path in
            # Config -> Metadata Providers instead of using this env var).
            #- GCD_DATABASE_PATH=/config/gcd.db
            - CLU_USERNAME=[USERNAME]
            - CLU_PASSWORD=[PASSWORD]
        #networks:
        #    - gcd-network

